name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check + lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run webview tests
        run: npm run test:webview

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build (minified)
        run: npm run prepackage

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: coogent-vsix-node${{ matrix.node-version }}
          path: "*.vsix"
          retention-days: 30
